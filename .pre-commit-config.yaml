repos:
    -   repo: https://github.com/pre-commit/pre-commit-hooks
        rev: v6.0.0
        hooks:
            -   id: trailing-whitespace
            -   id: check-added-large-files
                args: [ --enforce-all ]
            -   id: check-yaml
                args: [ --allow-multiple-documents ]
            -   id: end-of-file-fixer
    -   repo: https://github.com/astral-sh/ruff-pre-commit
        rev: v0.14.4
        hooks:
            # Run the linter.
            -   id: ruff-check
                types_or: [ python, pyi ]
                args: [ --fix ]
            -   id: ruff-format
                types_or: [ python, pyi ]
