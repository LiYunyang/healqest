[pycodestyle]
max-line-length = 120
ignore = E225,E228,W503,W504

[flake8]
docstring-convention=numpy
max-line-length = 120
max-complexity = 10
exclude =
    .git,
    __pycache__,
    local,
    build,
extend-select =
     E241,   # multiple spaces after ','
     E242    # tab after ',' (while you're at it)
extend-ignore =
    # ===== pycodestyle errors/warnings =====
    # missing whitespace around modulo operator
    E228,
    # missing whitespace around operator
    E225,
    # line break before/after binary operator
    W503, W504,

    # ===== flake8 errors =====
    # module imported but unused
    F401,
    # name may be undefined, or defined from star imports: module
    F405,
    # f-string without any placeholders
    F541,
    # local variable name is assigned to but never used
    F841,
    # ===== optional config =====
    # These should not be turned-off, but are hard to strickly follow
    # for code readability. So the following checks are disabled by
    # default but should be checked occassionally manually.
    # Missing docstrings
    D100,D101,D102,D103,D105
